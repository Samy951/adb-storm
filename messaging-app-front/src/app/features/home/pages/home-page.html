<main class="home-three">
    <section class="hero-card">
        <div class="hero-content">
            <div class="text">
                <h1>Welcome to <span class="logo">Flow</span>Chat</h1>
                <p>Simple, fast and fluid messaging for everyone.</p>

                <div class="actions">
                    <button routerLink="/auth" class="primary">Log in</button>
                    <button routerLink="/auth" class="secondary">Sign up</button>
                </div>
            </div>

            <div class="chat-preview">
                <div class="chat-header">Recent chats</div>

                <div class="chat-item">
                    <span class="avatar"></span>
                    <div>
                        <strong>Alex</strong>
                        <p>Are you free tonight?</p>
                    </div>
                </div>

                <div class="chat-item">
                    <span class="avatar"></span>
                    <div>
                        <strong>Sarah</strong>
                        <p>See you tomorrow.</p>
                    </div>
                </div>

                <div class="chat-item">
                    <span class="avatar"></span>
                    <div>
                        <strong>John</strong>
                        <p>Thanks for your message.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</main>
