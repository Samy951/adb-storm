apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service
  namespace: storm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: message-service
  template:
    metadata:
      labels:
        app: message-service
    spec:
      containers:
        - name: message-service
          image: stormmax8cr.azurecr.io/message-service:latest
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: VALKEY_URL
              value: "redis://valkey:6379"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: storm-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: storm-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: message-service
  namespace: storm
spec:
  selector:
    app: message-service
  ports:
    - port: 4001
      targetPort: 4001
