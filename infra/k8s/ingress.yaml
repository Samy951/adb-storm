apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: storm-ingress
  namespace: storm
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/websocket-services: "gateway"
    nginx.ingress.kubernetes.io/load-balance: "round_robin"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3001
          - path: /health
            pathType: Exact
            backend:
              service:
                name: gateway
                port:
                  number: 3001
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: message-service
                port:
                  number: 4001
          - path: /swagger
            pathType: Prefix
            backend:
              service:
                name: message-service
                port:
                  number: 4001
          - path: /presence
            pathType: Prefix
            backend:
              service:
                name: presence-service
                port:
                  number: 4002
          # Presence: online users per channel (must be before /channels catch-all)
          - path: /channels/[^/]+/online
            pathType: ImplementationSpecific
            backend:
              service:
                name: presence-service
                port:
                  number: 4002
          # Grafana
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
          # Message service: channels + messages (catch-all)
          - path: /channels
            pathType: Prefix
            backend:
              service:
                name: message-service
                port:
                  number: 4001
          # Web frontend (catch-all, must be last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
