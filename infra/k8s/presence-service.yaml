apiVersion: apps/v1
kind: Deployment
metadata:
  name: presence-service
  namespace: storm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: presence-service
  template:
    metadata:
      labels:
        app: presence-service
    spec:
      containers:
        - name: presence-service
          image: stormmax8cr.azurecr.io/presence-service:latest
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: VALKEY_URL
              value: "redis://valkey:6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: storm-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: presence-service
  namespace: storm
spec:
  selector:
    app: presence-service
  ports:
    - port: 4002
      targetPort: 4002
