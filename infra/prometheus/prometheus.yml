global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets:
          - "gateway:3001"
    metrics_path: /metrics

  - job_name: "message-service"
    static_configs:
      - targets:
          - "message-service:4001"
    metrics_path: /metrics

  - job_name: "presence-service"
    static_configs:
      - targets:
          - "presence-service:4002"
    metrics_path: /metrics

  - job_name: "haproxy"
    static_configs:
      - targets:
          - "haproxy:8404"
    metrics_path: /stats
    params:
      stats: [";csv"]
