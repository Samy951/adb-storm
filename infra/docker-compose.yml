services:
  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    command: valkey-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: storm
      POSTGRES_USER: storm
      POSTGRES_PASSWORD: storm_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storm -d storm"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: ../gateway
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      VALKEY_URL: "redis://valkey:6379"
      JWT_SECRET: "dev-secret-change-me"
    depends_on:
      valkey:
        condition: service_healthy

  message-service:
    build:
      context: ../services/message-service
      dockerfile: Dockerfile
    ports:
      - "4001:4001"
    environment:
      PORT: "4001"
      VALKEY_URL: "redis://valkey:6379"
      DATABASE_URL: "postgres://storm:storm_dev@postgres:5432/storm"
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy

  presence-service:
    build:
      context: ../services/presence-service
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    environment:
      PORT: "4002"
      VALKEY_URL: "redis://valkey:6379"
    depends_on:
      valkey:
        condition: service_healthy

  haproxy:
    image: haproxy:2.9-alpine
    ports:
      - "8080:8080"
      - "8404:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      gateway:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: storm
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  valkey-data:
  pgdata:
  prometheus-data:
  grafana-data:
