global
    maxconn 100000
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    option dontlognull
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    timeout tunnel 3600s
    timeout http-keep-alive 60s

frontend http_front
    bind *:8080

    # WebSocket detection
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_websocket hdr(Connection) -i upgrade

    # API routes → message-service
    acl is_api path_beg /auth /channels

    # Presence routes → presence-service
    acl is_presence path_beg /presence

    use_backend ws_back if is_websocket
    use_backend api_back if is_api
    use_backend presence_back if is_presence
    default_backend web_back

backend ws_back
    balance source
    option httpchk GET /health

    # WebSocket support
    timeout tunnel 3600s
    timeout server 3600s

    # Sticky sessions via cookie
    cookie SERVERID insert indirect nocache

    # Gateway instances (ajuster quand on scale)
    server gateway-1 gateway:3001 check cookie gw1 init-addr last,libc,none resolvers docker

backend api_back
    balance roundrobin
    option httpchk GET /health
    server message-1 message-service:4001 check

backend presence_back
    balance roundrobin
    server presence-1 presence-service:4002 check

backend web_back
    balance roundrobin
    server web-1 web:80 check

resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry 1s
    hold other 10s
    hold refused 10s
    hold nx 10s
    hold timeout 10s
    hold valid 10s

# Stats page
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats admin if TRUE
