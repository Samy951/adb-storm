name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-gateway:
    name: Gateway (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gateway/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gateway/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check compilation
        run: cargo check --all-targets

      - name: Run tests
        run: cargo test --all-targets

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy --all-targets -- -D warnings

  test-message-service:
    name: Message Service (Bun/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/message-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  test-presence-service:
    name: Presence Service (Bun/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/presence-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        working-directory: gateway
        run: cargo audit

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Audit message-service dependencies
        working-directory: services/message-service
        run: bun install --frozen-lockfile && bun x npm-audit-ci --moderate || true

      - name: Audit presence-service dependencies
        working-directory: services/presence-service
        run: bun install --frozen-lockfile && bun x npm-audit-ci --moderate || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-gateway, test-message-service, test-presence-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: gateway
          push: false
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

      - name: Build message-service image
        uses: docker/build-push-action@v6
        with:
          context: services/message-service
          push: false
          cache-from: type=gha,scope=message-service
          cache-to: type=gha,mode=max,scope=message-service

      - name: Build presence-service image
        uses: docker/build-push-action@v6
        with:
          context: services/presence-service
          push: false
          cache-from: type=gha,scope=presence-service
          cache-to: type=gha,mode=max,scope=presence-service

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-message-service, test-presence-service]
    services:
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6399:6379
        options: --health-cmd "valkey-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5
      postgres:
        image: postgres:16-alpine
        ports:
          - 5499:5432
        env:
          POSTGRES_DB: storm_test
          POSTGRES_USER: storm
          POSTGRES_PASSWORD: storm_test
        options: --health-cmd "pg_isready -U storm -d storm_test" --health-interval 5s --health-timeout 3s --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Init database
        run: PGPASSWORD=storm_test psql -h localhost -p 5499 -U storm -d storm_test -f migrations/001_initial_schema.sql

      - name: Install and start message-service
        run: |
          cd services/message-service && bun install --frozen-lockfile
          DATABASE_URL="postgres://storm:storm_test@localhost:5499/storm_test" \
          VALKEY_URL="redis://localhost:6399" \
          JWT_SECRET="test-e2e-secret" \
          PORT=4011 \
            bun run index.ts &
          sleep 3
          curl -sf http://localhost:4011/health

      - name: Install and start presence-service
        run: |
          cd services/presence-service && bun install --frozen-lockfile
          VALKEY_URL="redis://localhost:6399" \
          JWT_SECRET="test-e2e-secret" \
          PORT=4012 \
            bun run index.ts &
          sleep 3
          curl -sf http://localhost:4012/health

      - name: Install e2e dependencies
        run: cd tests/e2e && bun install

      - name: Run e2e tests
        env:
          E2E_MESSAGE_URL: http://localhost:4011
          E2E_PRESENCE_URL: http://localhost:4012
          E2E_JWT_SECRET: test-e2e-secret
        run: cd tests/e2e && bun test --timeout 30000

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [test-gateway, test-message-service, test-presence-service, e2e-tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push gateway
        run: az acr build --registry ${{ secrets.ACR_NAME }} --image gateway:${{ github.sha }} --image gateway:latest --platform linux/amd64 ./gateway

      - name: Build and push message-service
        run: az acr build --registry ${{ secrets.ACR_NAME }} --image message-service:${{ github.sha }} --image message-service:latest --platform linux/amd64 ./services/message-service

      - name: Build and push presence-service
        run: az acr build --registry ${{ secrets.ACR_NAME }} --image presence-service:${{ github.sha }} --image presence-service:latest --platform linux/amd64 ./services/presence-service

      - name: Build and push web frontend
        run: az acr build --registry ${{ secrets.ACR_NAME }} --image web:${{ github.sha }} --image web:latest --platform linux/amd64 ./web

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Apply K8s manifests
        run: |
          kubectl apply -f infra/k8s/web.yaml
          kubectl apply -f infra/k8s/ingress.yaml

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/gateway gateway=${{ secrets.ACR_NAME }}.azurecr.io/gateway:${{ github.sha }} -n storm
          kubectl set image deployment/message-service message-service=${{ secrets.ACR_NAME }}.azurecr.io/message-service:${{ github.sha }} -n storm
          kubectl set image deployment/presence-service presence-service=${{ secrets.ACR_NAME }}.azurecr.io/presence-service:${{ github.sha }} -n storm
          kubectl set image deployment/web web=${{ secrets.ACR_NAME }}.azurecr.io/web:${{ github.sha }} -n storm

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gateway -n storm --timeout=120s
          kubectl rollout status deployment/message-service -n storm --timeout=120s
          kubectl rollout status deployment/presence-service -n storm --timeout=120s
          kubectl rollout status deployment/web -n storm --timeout=60s

      - name: Verify deployment
        run: |
          kubectl get pods -n storm
          echo "Deployed commit ${{ github.sha }} to AKS"
