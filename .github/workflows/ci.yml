name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-gateway:
    name: Gateway (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gateway/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gateway/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check compilation
        run: cargo check --all-targets

      - name: Run tests
        run: cargo test --all-targets

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy --all-targets -- -D warnings

  test-message-service:
    name: Message Service (Bun/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/message-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit

      - name: Run tests
        run: bun test

  test-presence-service:
    name: Presence Service (Bun/TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/presence-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit

      - name: Run tests
        run: bun test

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit Rust dependencies
        working-directory: gateway
        run: cargo audit

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Audit message-service dependencies
        working-directory: services/message-service
        run: bun install --frozen-lockfile && bun x npm-audit-ci --moderate || true

      - name: Audit presence-service dependencies
        working-directory: services/presence-service
        run: bun install --frozen-lockfile && bun x npm-audit-ci --moderate || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-gateway, test-message-service, test-presence-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v6
        with:
          context: gateway
          push: false
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

      - name: Build message-service image
        uses: docker/build-push-action@v6
        with:
          context: services/message-service
          push: false
          cache-from: type=gha,scope=message-service
          cache-to: type=gha,mode=max,scope=message-service

      - name: Build presence-service image
        uses: docker/build-push-action@v6
        with:
          context: services/presence-service
          push: false
          cache-from: type=gha,scope=presence-service
          cache-to: type=gha,mode=max,scope=presence-service
